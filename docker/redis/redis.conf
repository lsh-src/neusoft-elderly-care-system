# ============================================================
# Redis 7.x 配置 — Docker 容器使用
# ============================================================

# 绑定地址（允许外部连接）
bind 0.0.0.0

# 端口
port 6379

# 密码（与 .env 中 REDIS_PASSWORD 一致）
requirepass 123456

# 持久化 - RDB
save 900 1
save 300 10
save 60 10000

# 持久化 - AOF
appendonly yes
appendfsync everysec

# 最大内存
maxmemory 256mb
maxmemory-policy allkeys-lru

# 日志级别
loglevel notice

# 数据目录
dir /data
