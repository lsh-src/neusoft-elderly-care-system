# ============================================================
# 东软颐养中心管理系统 — Docker Compose 基础设施编排
#
# 启动方式：
#   cd docker
#   cp .env.example .env    # 首次使用时复制并修改密码
#   docker-compose up -d
#
# 停止方式：
#   docker-compose down          # 停止容器（保留数据）
#   docker-compose down -v       # 停止容器并删除数据卷（慎用）
#
# 端口映射（所有端口映射到 localhost，与现有配置兼容）：
#   MySQL    : 3306
#   Redis    : 6380 (因其他项目占用 6379，映射到 6380)
#   RabbitMQ : 5673 (AMQP), 15673 (管理界面)  ← 因本地 RabbitMQ 占用 5672，映射到 5673
#   Nacos    : 18848 (HTTP), 19848/19849 (gRPC)  ← 因 Windows 端口保留范围，映射到 18848
#
# 后端启动时需添加 Docker profile：--spring.profiles.active=docker
# ============================================================

services:
  # ----------------------------------------------------------
  # MySQL 8.0 — 业务数据库 + Nacos 数据库
  # ----------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: elderlycare-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - project-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_0900_ai_ci
      --default-time-zone=+08:00

  # ----------------------------------------------------------
  # Redis 7.x — 缓存（当前未使用，为扩展预留）
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: elderlycare-redis
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - project-net
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-123456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # RabbitMQ 3.x (management) — 消息队列
  # ----------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: elderlycare-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
      RABBITMQ_DEFAULT_VHOST: /
      TZ: Asia/Shanghai
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - project-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ----------------------------------------------------------
  # Nacos 2.3.x (standalone) — 服务注册中心
  # 使用外部 MySQL 存储配置
  # ----------------------------------------------------------
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: elderlycare-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_SERVICE_DB_PARAM: "characterEncoding=utf8&connectTimeout=10000&socketTimeout=30000&autoReconnect=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
      JVM_XMS: 256m
      JVM_XMX: 256m
      JVM_XMN: 128m
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: "SecretKey012345678901234567890123456789012345678901234567890123456789"
      NACOS_AUTH_IDENTITY_KEY: "serverIdentity"
      NACOS_AUTH_IDENTITY_VALUE: "security"
      NACOS_USERNAME: ${NACOS_USERNAME:-nacos}
      NACOS_PASSWORD: ${NACOS_PASSWORD:-nacos}
      TZ: Asia/Shanghai
    ports:
      - "18848:8848"
      - "19848:9848"
      - "19849:9849"
    volumes:
      - nacos-logs:/home/nacos/logs
    networks:
      - project-net
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

# ============================================================
# 网络配置
# ============================================================
networks:
  project-net:
    driver: bridge
    name: elderlycare-net

# ============================================================
# 数据卷（持久化存储）
# ============================================================
volumes:
  mysql-data:
    name: elderlycare-mysql-data
  redis-data:
    name: elderlycare-redis-data
  rabbitmq-data:
    name: elderlycare-rabbitmq-data
  nacos-logs:
    name: elderlycare-nacos-logs
