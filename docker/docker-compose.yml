      SPRING_OPTS: "--spring.profiles.active=docker"
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -Xms256m -Xmx512m"
      AI_API_KEY: "${AI_API_KEY:-sk-ck6q7y9l8092gtr3tebig9wttng5cv8dp626ha0txqi4yqu9}"
      AI_BASE_URL: "${AI_BASE_URL:-https://api.xiaomimimo.com/anthropic}"
      AI_MODEL: "${AI_MODEL:-mimo-v2.5}"
      AI_EMBEDDING_MODEL: "${AI_EMBEDDING_MODEL:-text-embedding-v1}"
      TZ: Asia/Shanghai
    networks:
      - project-net
    depends_on:
      gateway:
        condition: service_started

# ============================================================
# 网络配置
# ============================================================
networks:
  project-net:
    driver: bridge
    name: elderlycare-net

# ============================================================
# 数据卷（持久化存储）
# ============================================================
volumes:
  mysql-data:
    name: elderlycare-mysql-data
  redis-data:
    name: elderlycare-redis-data
  rabbitmq-data:
    name: elderlycare-rabbitmq-data
  nacos-logs:
    name: elderlycare-nacos-logs
