    container_name: elderlycare-customer
    restart: unless-stopped
    environment:
      SERVICE_JAR: elderlycare-customer
      SPRING_OPTS: "--spring.profiles.active=docker"
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -Xms256m -Xmx512m"
      TZ: Asia/Shanghai
    networks:
      - project-net
    depends_on:
      gateway:
        condition: service_started

  bed:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: elderlycare-bed
    restart: unless-stopped
    environment:
      SERVICE_JAR: elderlycare-bed
      SPRING_OPTS: "--spring.profiles.active=docker"
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -Xms256m -Xmx512m"
      TZ: Asia/Shanghai
    networks:
      - project-net
    depends_on:
      gateway:
        condition: service_started

  checkin:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: elderlycare-checkin
    restart: unless-stopped
    environment:
      SERVICE_JAR: elderlycare-checkin
      SPRING_OPTS: "--spring.profiles.active=docker"
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -Xms256m -Xmx512m"
      TZ: Asia/Shanghai
    networks:
      - project-net
    depends_on:
      gateway:
        condition: service_started

  meal:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: elderlycare-meal
    restart: unless-stopped
    environment:
      SERVICE_JAR: elderlycare-meal
      SPRING_OPTS: "--spring.profiles.active=docker"
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -Xms256m -Xmx512m"
      TZ: Asia/Shanghai
    networks:
      - project-net
    depends_on:
      gateway:
        condition: service_started

  service:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: elderlycare-service
    restart: unless-stopped
    environment:
      SERVICE_JAR: elderlycare-service
      SPRING_OPTS: "--spring.profiles.active=docker"
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -Xms256m -Xmx512m"
