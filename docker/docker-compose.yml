        condition: service_started

  nursing:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: elderlycare-nursing
    restart: unless-stopped
    environment:
      SERVICE_JAR: elderlycare-nursing
      SPRING_OPTS: "--spring.profiles.active=docker"
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -Xms256m -Xmx512m"
      TZ: Asia/Shanghai
    networks:
      - project-net
    depends_on:
      gateway:
        condition: service_started

  dashboard:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: elderlycare-dashboard
    restart: unless-stopped
    environment:
      SERVICE_JAR: elderlycare-dashboard
      SPRING_OPTS: "--spring.profiles.active=docker"
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -Xms256m -Xmx512m"
