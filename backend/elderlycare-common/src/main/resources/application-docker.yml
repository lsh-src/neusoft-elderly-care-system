# ============================================================
# Docker 环境专用配置
# 使用方式：启动时添加 --spring.profiles.active=docker
# Docker Compose 端口映射已使用默认端口，无需额外覆盖
# ============================================================

spring:
  rabbitmq:
    port: ${RABBITMQ_PORT:5672}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
