# ============================================================
# Docker 容器环境专用配置
# 服务通过 --spring.profiles.active=docker 激活
# 所有地址使用 Docker 内部容器名，不走 localhost
# ============================================================

spring:
  cloud:
    nacos:
      discovery:
        server-addr: nacos:8848
  datasource:
    url: jdbc:mysql://mysql:3306/neusoft_elderly_care?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
  rabbitmq:
    host: rabbitmq
    listener:
      simple:
        auto-startup: true
