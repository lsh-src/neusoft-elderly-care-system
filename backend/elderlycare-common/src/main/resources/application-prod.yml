# ============================================================
# 生产环境配置 — 通过 --spring.profiles.active=prod 激活
# 覆盖 application-common.yml 中的默认值，指向 Docker 容器内部地址
# ============================================================

spring:
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:nacos:8848}
  datasource:
    url: ${DB_URL:jdbc:mysql://mysql:3306/neusoft_elderly_care?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}

# 生产环境关闭 Knife4j
knife4j:
  enable: false

# 生产环境日志级别
logging:
  level:
    com.neusoft.elderlycare: info
    org.springframework.cloud: warn
