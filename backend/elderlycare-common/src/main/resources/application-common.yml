# ============================================================
# 共享配置 — 所有业务模块通过 spring.profiles.include: common 引入
# 各模块只需在自己的 application.yml 中覆盖 server.port 和 spring.application.name
# ============================================================

spring:
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
      config:
        enabled: false
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/neusoft_elderly_care?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=true&verifyServerCertificate=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    listener:
      simple:
        auto-startup: false

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:neusoft-elderly-care-dev-secret-key-2026}
  expiration-minutes: ${JWT_EXPIRATION:720}

logging:
  level:
    com.neusoft.elderlycare.mapper: info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn

aliyun:
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:your-endpoint}
    accessKeyId: ${ALIYUN_OSS_ACCESS_KEY_ID:your-access-key-id}
    accessKeySecret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:your-access-key-secret}
    bucketName: ${ALIYUN_OSS_BUCKET_NAME:your-bucket-name}
    domain: ${ALIYUN_OSS_DOMAIN:https://your-bucket-name.your-endpoint}
