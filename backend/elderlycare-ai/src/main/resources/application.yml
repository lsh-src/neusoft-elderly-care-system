server:
  port: 8090

spring:
  application:
    name: elderlycare-ai
  profiles:
    include: common
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  rabbitmq:
    listener:
      simple:
        auto-startup: true

ai:
  api-key: ${AI_API_KEY:sk-c8rx80l4zs3ti1qvnsm4vgw2du2b5fg4uuqu8yva0f6bjbkx}
  base-url: ${AI_BASE_URL:https://api.xiaomimimo.com}
  model: ${AI_MODEL:mimo-v2.5}
  embedding-model: ${AI_EMBEDDING_MODEL:text-embedding-v1}
  max-tokens: ${AI_MAX_TOKENS:2048}
  temperature: ${AI_TEMPERATURE:0.3}
